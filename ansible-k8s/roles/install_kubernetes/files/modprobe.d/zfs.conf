# Limit ARC to 64GB (adjust based on your needs)
# Value is in bytes: 64 * 1024 * 1024 * 1024
options zfs zfs_arc_max=68719476736

# Set a minimum ARC of 16GB
options zfs zfs_arc_min=17179869184

# Throttle dirty data at 4GB instead of the default percentage
options zfs zfs_dirty_data_max=4294967296