apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ups
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
{{- range $path, $_ := .Files.Glob "dashboards/**/*.json" }}
  {{ $path | replace "dashboards/" "" | replace "/" "__" }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
