# https://github.com/bitnami/charts/blob/main/bitnami/phpmyadmin/values.yaml

phpmyadmin:
  phpmyadmin:
    hosts: "mariadb-svc.databases.svc.cluster.local,mariadb-test.databases.svc.cluster.local"
  ingress:
    enabled: true
    hostname: db.k3s.nf.lab
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: nf-lab
      cert-manager.io/private-key-rotation-policy: Always
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      external-dns.alpha.kubernetes.io/target: traefik.k3s.nf.lab
    hosts:
      - host: db.k3s.nf.lab
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: phpmyadmin-tls
        hosts:
          - db.k3s.nf.lab
