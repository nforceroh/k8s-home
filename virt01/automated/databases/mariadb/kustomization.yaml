apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app: mariadb-test

namespace: databases

resources:
  - mariadb-auth-sealed.yaml
  - database.yaml
  - backup-schedule.yaml

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: PersistentVolumeClaim
      name: data-mariadb-instance-0 # Follows pattern: data-<metadata.name>-0
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: Delete=false
      - op: add
        path: /metadata/finalizers
        value: ["kubernetes.io/pvc-protection"]