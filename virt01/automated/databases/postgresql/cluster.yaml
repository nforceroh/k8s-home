---

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-db
spec:
  # The database will consist of a single instance.
  instances: 1 
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  storage:
    size: 10Gi
  
  enableSuperuserAccess: true
  superuserSecret:
    name: pg-db-superuser

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-db-app
