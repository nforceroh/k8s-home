apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frigate-metrics
  namespace: camera # Or the namespace where Frigate is installed
  labels:
    app.kubernetes.io/name: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: frigate
  endpoints:
  - port: http # The name of the port in your Service definition
    path: /api/metrics
    interval: 30s
