apiVersion: v1
kind: ServiceAccount
metadata:
  name: frigate-restarter
  namespace: camera
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: camera
  name: frigate-restarter-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"] # Allows finding and deleting the pod
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"] # Required to run 'du' inside the container
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: camera
  name: frigate-restarter-binding
subjects:
- kind: ServiceAccount
  name: frigate-restarter
  namespace: camera
roleRef:
  kind: Role
  name: frigate-restarter-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frigate-restarter-binding
  namespace: camera
subjects:
  - kind: ServiceAccount
    name: frigate-restarter
roleRef:
  kind: Role
  name: pod-restarter-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: frigate-disk-watchdog
  namespace: camera
spec:
  schedule: "*/5 * * * *" # Runs every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: frigate-restarter
          containers:
          - name: watchdog
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              #!/bin/bash
              NAMESPACE="camera"
              THRESHOLD=500

              # 1. Get the pod name specifically in your namespace
              POD_NAME=$(kubectl get pods -n $NAMESPACE -l app.kubernetes.io/name=frigate -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

              if [ -z "$POD_NAME" ]; then
                echo "No Frigate pod found in namespace $NAMESPACE."
                exit 1
              fi

              # 2. Get usage (numeric only)
              USAGE_MB=$(kubectl exec -n $NAMESPACE $POD_NAME -c frigate -- du -sm /tmp/cache | awk '{print $1}')

              # 3. Logic check
              if [[ "$USAGE_MB" -gt "$THRESHOLD" ]]; then
                echo "Cache is ${USAGE_MB}MB. Restarting..."
                kubectl delete pod -n $NAMESPACE $POD_NAME
              else
                echo "Cache is ${USAGE_MB}MB. All good."
              fi
          restartPolicy: OnFailure
