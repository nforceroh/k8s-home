apiVersion: v1
kind: ServiceAccount
metadata:
  name: frigate-restarter
  namespace: camera
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-restarter-role
  namespace: camera
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frigate-restarter-binding
  namespace: camera
subjects:
  - kind: ServiceAccount
    name: frigate-restarter
roleRef:
  kind: Role
  name: pod-restarter-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: frigate-disk-watchdog
  namespace: camera
spec:
  schedule: "*/5 * * * *" # Runs every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: frigate-restarter
          containers:
          - name: watchdog
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              # 1. Get the pod name (ensure the label matches your deployment)
              POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=frigate -o name | head -n 1)

              if [ -z "$POD_NAME" ]; then
                echo "No Frigate pod found. Exiting."
                exit 0
              fi

              # 2. Run du, specifying the container and silencing warnings
              # We use 'cut' to ensure we only get the number
              USAGE_MB=$(kubectl exec $POD_NAME -c frigate -- du -sm /tmp/cache 2>/dev/null | awk '{print $1}')

              # 3. Check if USAGE_MB is a valid number before comparing
              if [ -n "$USAGE_MB" ] && [ "$USAGE_MB" -eq "$USAGE_MB" ] 2>/dev/null; then
                if [ "$USAGE_MB" -gt 500 ]; then
                  echo "Frigate cache is at ${USAGE_MB}MB. Deleting pod..."
                  kubectl delete $POD_NAME
                else
                  echo "Frigate cache is at ${USAGE_MB}MB. Below threshold."
                fi
              else
                echo "Error: Could not retrieve disk usage. (Value: '$USAGE_MB')"
              fi

          restartPolicy: OnFailure
