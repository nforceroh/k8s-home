apiVersion: v1
kind: ServiceAccount
metadata:
  name: frigate-restarter
  namespace: camera
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-restarter-role
  namespace: camera
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frigate-restarter-binding
  namespace: camera
subjects:
  - kind: ServiceAccount
    name: frigate-restarter
roleRef:
  kind: Role
  name: pod-restarter-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: frigate-disk-watchdog
  namespace: camera
spec:
  schedule: "*/5 * * * *" # Runs every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: frigate-restarter
          containers:
          - name: watchdog
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              # Find the frigate pod name
              POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=frigate -o jsonpath='{.items[0].metadata.name}')
              
              # Run 'du' inside the frigate pod to check usage
              USAGE_MB=$(kubectl exec $POD_NAME -- du -sm /tmp/cache | awk '{print $1}')
              
              if [ "$USAGE_MB" -gt 500 ]; then
                echo "Frigate cache is at ${USAGE_MB}MB. Restarting pod..."
                kubectl delete pod $POD_NAME
              else
                echo "Frigate cache is at ${USAGE_MB}MB. No action needed."
              fi
          restartPolicy: OnFailure
