---
# Source: frigate/charts/frigate/templates/config-pvc.yaml
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: frigate-config
  namespace: camera
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "10Gi"
  storageClassName: openebs-zfspv-lz4
---
# Source: frigate/templates/frigate-media-pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-media
  namespace: camera
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi # Adjust the size as needed for your application
  storageClassName: frigate-local-storage