apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scrypted-pvc
  namespace: camera
  labels:
    backup.k8s-home.io/pvc: scrypted-pvc
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    "helm.sh/resource-policy": keep
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: openebs-zfspv-lz4
