apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: single-node-grouped-silence
  namespace: monitoring
spec:
  matchers:
    # Group 1: Etcd & Control Plane (7 instances)
    - name: alertname
      value: (etcdMembersDown|etcdInsufficientMembers|KubeControllerManagerDown|KubeSchedulerDown|KubeProxyDown)
      matchType: "=~"

    # Group 2: Connectivity (5 instances)
    - name: alertname
      value: "TargetDown"
      matchType: "="

    # Group 3: Monitoring Rules (4 instances)
    - name: alertname
      value: "PrometheusRuleFailures"
      matchType: "="

    # Group 4: Storage & Infrastructure (1 instance)
    - name: alertname
      value: (CDIDefaultStorageClassDegraded|CDIStorageProfilesIncomplete|NodeFilesystemAlmostOutOfSpace)
      matchType: "=~"
