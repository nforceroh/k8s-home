installation:
  enabled: true
  kubernetesProvider: ""
  calicoNetwork:
    bgp: Disabled                     # Disables the broken BGP peering mesh
    hostPorts: Enabled
    linuxDataplane: Iptables
    # Explicitly binds Calico to your actual master host interface
    nodeAddressAutodetectionV4:
      interface: eno1.1000
    # Explicitly binds Calico to your master IPv6 interface layout
    nodeAddressAutodetectionV6:
      interface: eno1.1000
    ipPools:
      # Restores your functional IPv4 workload spaces
      - cidr: 10.244.0.0/16
        encapsulation: VXLANCrossSubnet
        natOutgoing: Enabled
        nodeSelector: all()
      # Restores your functional private IPv6 workload spaces
      - cidr: fd00:244::/64
        encapsulation: VXLANCrossSubnet
        natOutgoing: Enabled
        nodeSelector: all()

calicoNode:
  env:
    IP6: "autodetect"
    FELIX_IPV6SUPPORT: "true"
