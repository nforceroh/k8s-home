gpu-operator:
  cdi:
    enabled: true 
  operator:
    cleanupCRD: true

  nfd:
    enabled: true

  devicePlugin:
    enabled: true
    config:
      create: false
      name: time-slicing-config-all
      default: "Tesla-P40"

  driver:
    enabled: false

  migManager:
    enabled: false
    config:
      create: false
      default: all-disabled
      name: default-mig-parted-config

  toolkit:
    enabled: true # Must be true for containers to actually use the GPU

  dcgm:
    enabled: true # Enable for health monitoring

  vgpuDeviceManager:
    enabled: false

  dcgmExporter:
    enabled: true
    serviceMonitor:
      enabled: true