apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: tools-lubelog-daily-local
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-options: ForceNamespace=velero
spec:
  schedule: CRON_TZ=America/New_York 10 5 * * *
  skipImmediately: false
  template:
    includedNamespaces:
      - tools
    includedResources:
      - '*'
    labelSelector:
      matchLabels:
        app: lubelog
    ttl: 168h0m0s
    snapshotVolumes: true
    snapshotMoveData: false
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: tools-lubelog-weekly-offsite-cfr2
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-options: ForceNamespace=velero
spec:
  schedule: CRON_TZ=America/New_York 10 5 * * 3
  skipImmediately: false
  template:
    includedNamespaces:
      - tools
    includedResources:
      - '*'
    labelSelector:
      matchLabels:
        app: lubelog
    ttl: 720h0m0s
    snapshotVolumes: true
    snapshotMoveData: true
