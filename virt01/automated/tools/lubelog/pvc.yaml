---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lubelogger-img-pvc
  namespace: tools
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    helm.sh/resource-policy: keep
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
