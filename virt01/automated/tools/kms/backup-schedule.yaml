apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: tools-kms-daily-local
  namespace: velero
spec:
  schedule: CRON_TZ=America/New_York 0 5 * * *
  skipImmediately: false
  template:
    includedNamespaces:
      - tools
    includedResources:
      - '*'
    labelSelector:
      matchLabels:
        app: kms
    ttl: 168h0m0s
    snapshotVolumes: true
    snapshotMoveData: false
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: tools-kms-weekly-offsite-cfr2
  namespace: velero
spec:
  schedule: CRON_TZ=America/New_York 0 5 * * 3
  skipImmediately: false
  template:
    includedNamespaces:
      - tools
    includedResources:
      - '*'
    labelSelector:
      matchLabels:
        app: kms
    ttl: 720h0m0s
    snapshotVolumes: true
    snapshotMoveData: true
