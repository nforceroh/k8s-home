apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kms-pvc
  namespace: tools
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    helm.sh/resource-policy: keep
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: openebs-zfspv-lz4
  resources:
    requests:
      storage: 100Mi
  volumeMode: Filesystem
