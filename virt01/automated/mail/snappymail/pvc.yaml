apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snappymail-pvc
  namespace: mail
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    "helm.sh/resource-policy": keep
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
