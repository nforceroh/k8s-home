apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postfix-spool-pvc
  namespace: mail
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    helm.sh/resource-policy: keep
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: openebs-zfspv-lz4
  resources:
    requests:
      storage: 5Gi
  volumeMode: Filesystem
