apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: default # Ensure this matches your Rspamd namespace
data:
  unbound.conf: |
    server:
        interface: 127.0.0.1
        port: 53
        do-ip4: yes
        do-udp: yes
        do-tcp: yes

        # Security adjustments for running as a local pod sidecar
        access-control: 127.0.0.0/8 allow
        hide-identity: yes
        hide-version: yes

        # Ensure internal Kubernetes queries remain intact
        local-zone: "cluster.local." transparent

    # --- FORWARD INTERNAL CLUSTER DNS TO COREDNS ---
    forward-zone:
        name: "cluster.local."
        forward-addr: 10.96.0.10

    # --- FORWARD ALL EXTERNAL TRAFFIC TO PUBLIC RESOLVERS ---
    forward-zone:
        name: "."
        forward-addr: 1.1.1.1
        forward-addr: 8.8.8.8
