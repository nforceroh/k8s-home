kind: Deployment
apiVersion: apps/v1
metadata:
  name: vimbadmin
  labels:
    app: vimbadmin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vimbadmin
  template:
    metadata:
      labels:
        app: vimbadmin
    spec:
      serviceAccountName: vimbadmin-sa
      containers:
        - name: vimbadmin
          image: ghcr.io/nforceroh/k8s-vimbadmin:latest
          imagePullPolicy: Always
          env:
            - name: TZ
              value: "America/New_York"
          envFrom:
          - secretRef:
              name: vimbadmin-secrets
          ports:
            - containerPort: 8080
              name: vimbadmin-port
              protocol: TCP
          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"

