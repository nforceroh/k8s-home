apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: speaches-pvc
  namespace: ai
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeMode: Filesystem
