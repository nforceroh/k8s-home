---
ollama:
  image:
    repository: ollama/ollama
  ollama:
    gpu:
      enabled: true
      type: 'nvidia'
    models:
      pull:
        - "llama3.1:8b"           # Balanced daily driver
        - "qwen2.5-coder:7b"      # Massive upgrade over 1.5b for coding
        - "mistral-nemo:12b"      # Fits perfectly in P40 VRAM (12.28B params)
        - "deepseek-coder-v2:16b" # Great for complex logic
        - "command-r:35b"   
  runtimeClassName: "nvidia"
  extraEnv:
    - name: OLLAMA_FLASH_ATTENTION
      value: "0"  # Mandatory: Pascal GPUs like the P40 do not support Flash Attention
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "5"  
  service:
    type: LoadBalancer
    annotations:
      metallb.io/address-pool: vlan1400
      external-dns.alpha.kubernetes.io/hostname: ollama-api.k3s.nf.lab
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: nf-lab
      cert-manager.io/private-key-rotation-policy: Always
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure  
      kubernetes.io/ingress.class: traefik
      external-dns.alpha.kubernetes.io/target: traefik.k3s.nf.lab
    hosts:
    - host: ollama.k3s.nf.lab
      paths:
        - path: /
          pathType: Prefix
    tls:
    - hosts:
      - ollama.k3s.nf.lab
      secretName: ollama-tls
  serviceAccount:
    create: true
    automount: true
    name: ollama-sa
  persistentVolume:
    enabled: true
    existingClaim: ollama
    size: 50Gi

