---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: torrent-aurral
  namespace: velero
spec:
  schedule: CRON_TZ=America/New_York 35 6 * * 3
  skipImmediately: false
  template:
    csiSnapshotTimeout: 0s
    hooks: {}
    includedNamespaces:
      - torrent
    includedResources:
      - '*'
    itemOperationTimeout: 0s
    labelSelector:
      matchLabels:
        app: aurral
    metadata: {}
    ttl: 336h0m0s
  useOwnerReferencesInBackup: false
