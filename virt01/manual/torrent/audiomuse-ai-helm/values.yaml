# https://github.com/NeptuneHub/AudioMuse-AI-helm/blob/main/values.yaml

audiomuse-ai:
  timezone: "America/New_York"

  flask:
    replicaCount: 1
    service:
      type: LoadBalancer
      port: 8000
    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10

  worker:
    replicaCount: 1

  redis:
    enabled: false
    external:
      url: "redis://redis-master.databases.svc.cluster.local:6379/10"           # e.g. "redis://my-redis-cluster:6379/0"

  postgres:
    enabled: false
    external:
      host: "pg-db-rw.databases.svc.cluster.local"          # e.g. "audiomuse-postgresql-rw" (CNPG rw service)
      port: 5432
    user: "postgres"
    password: "myPGDBpw11!" # IMPORTANT: Change this for production or use --set
    db: "app"      
    # existingSecret: "audiomuse-ai-config"
    # existingSecretKeys:
    #   user: "POSTGRES_USER"
    #   password: "POSTGRES_PASSWORD"
    #   db: "POSTGRES_DB"

  ingress:
    enabled: true
    className: "traefik"
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: nf-lab
      cert-manager.io/private-key-rotation-policy: Always
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      external-dns.alpha.kubernetes.io/target: traefik.k3s.nf.lab
    hosts:
      - host: audiomuse-ai.k3s.nf.lab
        paths:
          - path: /
            pathType: Prefix
    tls:
    - hosts:
      - audiomuse-ai.k3s.nf.lab
      secretName: audiomuse-ai-cert-tls
 