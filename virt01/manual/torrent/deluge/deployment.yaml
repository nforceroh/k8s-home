kind: Deployment
apiVersion: apps/v1
metadata:
  name: deluge
  labels:
    app: deluge
spec:
  restartPolicy: OnFailure  # or Never, depending on your preference
  activeDeadlineSeconds: 3600  # Pod dies after 1 hour of failures
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deluge
  template:
    metadata:
      labels:
        app: deluge
      annotations:
        backup.velero.io/backup-volumes-excludes: torrent
        backup.velero.io/backup-volumes: deluge-pv
    spec:
      serviceAccountName: deluge-sa
      containers:
        - name: wireguard
#          image: harbor.nf.lab/homelab/wireguard-go:latest
          image: ghcr.io/nforceroh/k8s-wireguard:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: wg-config
              mountPath: /etc/wireguard/wg0.conf
              subPath: wg0.conf
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          env:
            - name: TZ
              value: "America/New_York"
            - name: CHECK_INTERVAL
              value: "30"
            - name: IP_CHECK_INTERVAL
              value: "60"
            - name: CLUSTER_SUBNET
              value: "10.0.0.0/23"
            - name: WG_MAX_HANDSHAKE_AGE
              value: "180"  # Fail healthcheck if handshake older than 3 min
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36  # ~3 minutes total before pod fails
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 10Mi
              cpu: 25m
            limits:
              memory: "16Gi"
              cpu: 500m
        - name: deluge
          image: lscr.io/linuxserver/deluge:2.2.0-r1-ls364
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "3000"
            - name: PGID
              value: "3000"
            - name: TZ
              value: "America/New_York"
            - name: DOCKER_MODS
              value: ghcr.io/themepark-dev/theme.park:deluge
            - name: TP_THEME
              value: dark
          ports:
            - containerPort: 8112
              name: deluge-port
              protocol: TCP
          resources:
            requests:
              memory: 1Gi
              cpu: 25m
          volumeMounts:
            - name: deluge-pv
              mountPath: /config
            - name: torrent
              mountPath: /data
            - name: web-config
              mountPath: /config/web.conf.cm
              subPath: web.conf
            - name: core-config
              mountPath: /config/core.conf.cm
              subPath: core.conf
      volumes:
        - name: deluge-pv
          persistentVolumeClaim:
            claimName: deluge-pvc
        - name: torrent
          hostPath:
            type: Directory
#          nfs:
            path: /mnt/hdd01/torrent
#            server: 10.0.0.100            
        - name: wg-config
          secret:
            secretName: wg-config
        - name: web-config
          configMap:
            name: web-conf-cm
        - name: core-config
          configMap:
            name: core-conf-cm

