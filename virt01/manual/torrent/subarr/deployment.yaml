kind: Deployment
apiVersion: apps/v1
metadata:
  name: subarr
  labels:
    app: subarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: subarr
  template:
    metadata:
      annotations:
        backup.velero.io/backup-volumes: subarr-pv
      labels:
        app: subarr
    spec:
      runtimeClassName: nvidia
      serviceAccountName: subarr-sa
      containers:
        - name: subarr
          image: ghcr.io/coaxk/subarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "3000"
            - name: PGID
              value: "3000"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "America/New_York"
            - name: SUBARR_DB_PATH
              value: /data/subarr.db
            - name: SUBARR_MEDIA_ROOT
              value: /media/library
            - name: ARR_PATH_PREFIX
              value: /
            - name: SUBGEN_MEDIA_PREFIX
              value: /media
          envFrom:
          - secretRef:
              name: subarr-config
          ports:
            - containerPort: 9922
              name: subarr-port
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 100Mi
          volumeMounts:
            - name: subarr-pv
              mountPath: /data
            - name: tv
              mountPath: /media/library/tv
            - name: movies
              mountPath: /media/library/movies
      volumes:
        - name: subarr-pv
          persistentVolumeClaim:
            claimName: subarr-pvc
        - name: tv
          hostPath:
            type: Directory
            path: /mnt/hdd01/emby/TVShows
        - name: movies
          hostPath:
            type: Directory
            path: /mnt/hdd01/emby/Movies
