apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail
nameSuffix: -test

labels:
  - pairs:
      app: dovecot-test
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - service.yaml
  - serviceaccount.yaml
  - certificate.yaml
  - secrets.yaml
  - DNSEndpoint.yaml
  - backup-schedule.yaml
  - dovecot-secrets-sealed.yaml

configMapGenerator:
  - name: dovecot-env
    envs:
      - maps/env.txt

generatorOptions:
  disableNameSuffixHash: true

