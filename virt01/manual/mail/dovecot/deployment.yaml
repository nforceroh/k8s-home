kind: Deployment
apiVersion: apps/v1
metadata:
  name: dovecot
  labels:
    app: dovecot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dovecot
  template:
    metadata:
      labels:
        app: dovecot
      annotations:
        backup.velero.io/backup-volumes: dovecot-pv
    spec:
      serviceAccountName: dovecot-sa
      containers:
        - name: dovecot
          #image: harbor.nf.lab/homelab/dovecot:latest
          image: ghcr.io/nforceroh/k8s-dovecot:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: dovecot-env
            - secretRef:
                name: dovecot-secrets                
          ports:
            - containerPort: 24
              name: ltmp-port
              protocol: TCP
            - containerPort: 110
              name: pop3-port
              protocol: TCP
            - containerPort: 143
              name: imap-port
              protocol: TCP
            - containerPort: 993
              name: imaps-port
              protocol: TCP
            - containerPort: 3333
              name: doveadm-port
              protocol: TCP
            - containerPort: 4190
              name: sieve-port
              protocol: TCP
            - containerPort: 12345
              name: sasl-port
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - SYS_CHROOT
                - DAC_OVERRIDE
                - FOWNER
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "10m"
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              port: 24
            initialDelaySeconds: 20
            timeoutSeconds: 1
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: 24
            initialDelaySeconds: 120
            timeoutSeconds: 1
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: dovecot-pv
              mountPath: /data
            - name: dhparam
              subPath: dh4096.pem
              mountPath: /etc/dovecot/dh4096.pem
              readOnly: true
            - name: certs
              subPath: tls.crt
              mountPath: /etc/dovecot/certs/tls.crt
              readOnly: true
            - name: certs
              subPath: tls.key
              mountPath: /etc/dovecot/certs/tls.key
              readOnly: true
      volumes:
        - name: dovecot-pv
          persistentVolumeClaim:
            claimName: dovecot-pvc
        - name: dhparam
          secret:
            secretName: dovecot-dhparam
        - name: certs
          secret:
            secretName: dovecot-cert-tls
