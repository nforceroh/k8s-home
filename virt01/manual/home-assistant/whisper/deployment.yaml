kind: Deployment
apiVersion: apps/v1
metadata:
  name: whisper
  labels:
    app: whisper
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      runtimeClassName: nvidia
      containers:
        - name: whisper
          image: ghcr.io/xpenno255/wyoming-whisper-cuda:latest
          args:
            - --model
            - medium
            - --language
            - en
            - --beam-size
            - "1"
            - --compute-type
            - float32
            - --device
            - cuda
            - --uri
            - tcp://0.0.0.0:10300
            - --data-dir
            - /data
            - --download-dir
            - /data
          imagePullPolicy: Always
          ports:
            - name: whisper-port
              containerPort: 10300
          volumeMounts:
            - name: whisper-data-pv
              mountPath: /data
      volumes:
        - name: whisper-data-pv
          persistentVolumeClaim:
            claimName: whisper-data-pvc